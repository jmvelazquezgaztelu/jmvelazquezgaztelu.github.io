<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>77 Soluciones | En construcción</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Oswald:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --gris-fondo: #c0c0c0;
        --azul-claro: #afdbf5;
        --casi-blanco: #f8f9fa;
        --azul-oscuro: #1b263b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--gris-fondo);
        color: var(--azul-oscuro);
        font-family: "Montserrat", sans-serif;
      }

      main {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .construction-card {
        width: min(92vw, 560px);
        padding: 2.5rem 2rem;
        background: var(--casi-blanco);
        border: 2px solid var(--azul-oscuro);
        border-radius: 16px;
        text-align: center;
        box-shadow: 0 12px 24px rgba(27, 38, 59, 0.15);
      }

      .img-container {
        width: 100%;
        display: flex;
        justify-content: center;
      }

      .logo {
        width: min(220px, 60%);
        height: auto;
        margin-bottom: 1.5rem;
      }

      h1 {
        margin: 0;
        font-family: "Oswald", sans-serif;
        font-size: clamp(2rem, 5vw, 3rem);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      p {
        margin: 1rem 0 0;
        font-size: 1.05rem;
        line-height: 1.6;
      }

      .badge {
        display: inline-block;
        margin-top: 1.5rem;
        padding: 0.45rem 0.9rem;
        border-radius: 999px;
        background: var(--azul-claro);
        font-weight: 600;
        color: inherit;
        text-decoration: none;
        transition:
          transform 160ms ease,
          box-shadow 160ms ease;
      }

      .badge:hover,
      .badge:focus-visible {
        transform: translateY(-3px);
        box-shadow: 0 10px 18px rgba(27, 38, 59, 0.2);
      }

      @media (max-width: 600px) {
        body {
          place-items: start center;
        }

        main {
          margin-top: 80px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="img-container">
        <img
          class="logo"
          src="assets/img/logo.webp"
          alt="Logo de 77 Soluciones"
        />
      </div>
      <div class="construction-card">
        <h1>En construcción</h1>
        <p>
          Estamos preparando algo grande para ti.<br />
          Muy pronto esta web estará disponible.
        </p>
        <a class="badge" href="mailto:info@77soluciones.com"
          >Contacta con 77 Soluciones</a
        >
      </div>
    </main>
  </body>
</html>
